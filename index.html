<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>El Universo de Maira y Theo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="castle">
    <div id="table">
      <div class="crater c1"></div>
      <div class="crater c2"></div>
      <div class="crater c3"></div>
      <div class="crater c4"></div>
      <div class="crater c5"></div>
      <div class="crater c6"></div>
      <div class="crater c7"></div>
      <div class="crater c8"></div>
      <div class="crater c9"></div>
    </div>
    
    <div class="cosmic-glow"></div>

    <div class="shade-wrap hover-animation" id="main">
      <div id="flower-wrap">
        <div id="stem"></div>
        <div id="petal1"></div>
        <div id="petal2"></div>
        <div id="petal3"></div>
        <div id="petal4"></div>
        <div id="petal5"></div>
        <div id="falling-petal"></div>
        <div id="leaf1"></div>
        <div id="leaf2"></div>
      </div>
    </div>

    <div class="shade-wrap" id="sub">
      <div id="shade-main-reflections"></div>
      <div id="shade-main">
        <div id="shade-handle-big"></div>
        <div id="shade-handle-small"></div>
        <div id="top-reflection"></div>
      </div>
    </div>

    <div class="character-maira">
      <div class="hair-back"></div>
      <div class="body-dress"></div>
      <div class="head">
        <div class="hair-front"></div>
        <div class="face-profile"></div>
        <div class="eyes"></div>
      </div>
      <div class="legs-curled"></div>
    </div>

    <div class="cat-theo">
      <div class="cat-body">
        <div class="cat-tail"></div>
      </div>
      <div class="cat-head">
        <div class="cat-ear left"></div>
        <div class="cat-ear right"></div>
        <div class="cat-eyes"></div>
      </div>
    </div>

    <div id="message-container">
      <h1 id="rosa-texto">un pequeño detalle para maira :)</h1>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
